<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>bicycle bell2.mp3 test v2</title>
<style>
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#1d2327;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    touch-action:manipulation;
  }
  #wrap{
    position:fixed;
    inset:0;
    overflow:hidden;
    background:#1d2327;
  }
  #game{
    position:absolute;
    left:0;
    top:0;
    width:1200px;
    height:675px;
    overflow:hidden;
    background:linear-gradient(#e8f7ff 0 57%, #d7d0ca 57% 100%);
    transform-origin:0 0;
  }
  #road{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    height:190px;
    background:#b9b0aa;
    border-top:6px solid #938b86;
  }
  #controls{
    position:absolute;
    left:22px;
    top:18px;
    z-index:50;
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
    max-width:620px;
  }
  button{
    font-size:22px;
    font-weight:800;
    color:white;
    background:#c82020;
    border:3px solid #7b1111;
    border-radius:8px;
    padding:12px 16px;
    box-shadow:0 4px 0 rgba(0,0,0,.22);
  }
  button:disabled{opacity:.48;}
  #resetBtn{background:#2567b8;border-color:#12376a;}
  #status{
    position:absolute;
    left:22px;
    top:88px;
    z-index:45;
    width:430px;
    padding:10px 12px;
    color:#1f1b00;
    background:#ffe35d;
    border:3px solid #7e6a00;
    border-radius:8px;
    font-size:20px;
    font-weight:800;
  }
  #speech{
    position:absolute;
    left:50%;
    bottom:30px;
    transform:translateX(-50%);
    z-index:45;
    width:720px;
    min-height:78px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:#111;
    background:#fff06a;
    border:5px solid #a80000;
    border-radius:10px;
    font-size:30px;
    font-weight:900;
    line-height:1.25;
  }
  #bicycle{
    position:absolute;
    z-index:20;
    left:1260px;
    bottom:72px;
    width:300px;
    height:auto;
    object-fit:contain;
    display:none;
    pointer-events:none;
  }
  #police{
    position:absolute;
    z-index:25;
    right:18px;
    bottom:50px;
    width:190px;
    height:auto;
    object-fit:contain;
    display:block;
    pointer-events:none;
  }
  #log{
    position:absolute;
    right:18px;
    top:18px;
    z-index:60;
    width:390px;
    max-height:250px;
    overflow:auto;
    padding:10px 12px;
    background:rgba(0,0,0,.80);
    color:#d8ffdf;
    border:3px solid #78d38a;
    border-radius:8px;
    font:15px/1.35 ui-monospace,SFMono-Regular,Menlo,monospace;
    white-space:pre-wrap;
  }
  @media (max-aspect-ratio: 13/9){
    #controls{max-width:520px;}
    button{font-size:20px;padding:10px 12px;}
    #status{top:122px;width:360px;font-size:18px;}
    #log{width:340px;max-height:210px;font-size:14px;}
    #speech{width:650px;font-size:28px;}
  }
</style>
</head>
<body>
<div id="wrap">
  <main id="game">
    <div id="road"></div>
    <div id="controls">
      <button id="initBtn" type="button">音声初期化</button>
      <button id="startBtn" type="button">自転車イベント開始</button>
      <button id="resetBtn" type="button">もう一度テスト</button>
    </div>
    <div id="status">音声初期化を押してください</div>
    <img id="police" src="policeman.png" alt="警官">
    <img id="bicycle" src="bicycle.png" alt="自転車">
    <div id="speech">bell2.mp3 検証 v2</div>
    <div id="log"></div>
  </main>
</div>
<audio id="bell" src="bell2.mp3" preload="auto" playsinline></audio>

<script>
'use strict';
const W=1200,H=675;
const game=document.getElementById('game');
const initBtn=document.getElementById('initBtn');
const startBtn=document.getElementById('startBtn');
const resetBtn=document.getElementById('resetBtn');
const statusBox=document.getElementById('status');
const speechBox=document.getElementById('speech');
const logBox=document.getElementById('log');
const bicycle=document.getElementById('bicycle');
const police=document.getElementById('police');
const bell=document.getElementById('bell');
let audioUnlocked=false;
let eventRunning=false;

function viewportSize(){
  const vv=window.visualViewport;
  return {
    w: Math.max(1, vv ? vv.width : window.innerWidth),
    h: Math.max(1, vv ? vv.height : window.innerHeight)
  };
}
function fit(){
  const v=viewportSize();
  const safe=10;
  const scale=Math.min((v.w-safe*2)/W, (v.h-safe*2)/H);
  const s=Math.max(.1, scale);
  const x=Math.max(0, (v.w-W*s)/2);
  const y=Math.max(0, (v.h-H*s)/2);
  game.style.transform='translate('+x+'px,'+y+'px) scale('+s+')';
}
addEventListener('resize',fit,{passive:true});
addEventListener('orientationchange',()=>setTimeout(fit,180),{passive:true});
if(window.visualViewport)visualViewport.addEventListener('resize',fit,{passive:true});
fit();
setTimeout(fit,250);

function log(msg){
  const time=new Date().toLocaleTimeString();
  logBox.textContent+='['+time+'] '+msg+'\n';
  logBox.scrollTop=logBox.scrollHeight;
}
function clearLog(){logBox.textContent='';}
function setStatus(text){statusBox.textContent=text;}
function wait(ms){return new Promise(resolve=>setTimeout(resolve,ms));}
function formatError(err){
  if(!err)return 'unknown error';
  const name=err.name?err.name+': ':'';
  return name+(err.message||String(err));
}

function resetVisuals(keepLog){
  eventRunning=false;
  startBtn.disabled=false;
  bicycle.style.transition='none';
  bicycle.style.display='none';
  bicycle.style.left='1260px';
  bicycle.style.bottom='72px';
  speechBox.textContent='bell2.mp3 検証 v2';
  setStatus(audioUnlocked?'音声初期化OK':'音声初期化を押してください');
  try{bell.pause();bell.currentTime=0;}catch(e){}
  if(!keepLog)clearLog();
  log('reset ready');
}

async function unlockBell(){
  log('音声初期化開始');
  try{
    const oldMuted=bell.muted;
    const oldDefaultMuted=bell.defaultMuted;
    const oldVolume=bell.volume;
    bell.muted=true;
    bell.defaultMuted=true;
    bell.setAttribute('muted','');
    bell.volume=0;
    bell.currentTime=0;
    bell.load();
    const p=bell.play();
    if(p&&p.then)await p;
    await wait(260);
    bell.pause();
    bell.currentTime=0;
    bell.muted=oldMuted;
    bell.defaultMuted=oldDefaultMuted;
    if(!oldMuted&&!oldDefaultMuted)bell.removeAttribute('muted');
    bell.volume=oldVolume;
    audioUnlocked=true;
    setStatus('音声初期化OK');
    log('bell2.mp3 unlock success');
  }catch(err){
    audioUnlocked=false;
    setStatus('音声初期化失敗');
    log('bell2.mp3 unlock failed: '+formatError(err));
  }
}

async function playBell(label){
  try{
    bell.pause();
    bell.muted=false;
    bell.defaultMuted=false;
    bell.removeAttribute('muted');
    bell.volume=1;
    bell.currentTime=0;
    if(bell.readyState===0)bell.load();
    const p=bell.play();
    if(p&&p.then)await p;
    log(label+' play success');
    setStatus('bell2.mp3 再生OK');
    return true;
  }catch(err){
    log(label+' play failed: '+formatError(err));
    setStatus('bell2.mp3 再生失敗');
    return false;
  }
}

function pickKyoko(){
  const voices=speechSynthesis.getVoices ? speechSynthesis.getVoices() : [];
  return voices.find(v=>/Kyoko/i.test(v.name)) ||
         voices.find(v=>/ja-JP|Japanese|日本語/i.test((v.lang||'')+' '+(v.name||''))) ||
         null;
}
function speakPolice(text){
  return new Promise(resolve=>{
    if(!('speechSynthesis' in window)){log('speechSynthesis unavailable');resolve();return;}
    try{speechSynthesis.cancel();}catch(e){}
    const u=new SpeechSynthesisUtterance(text);
    u.lang='ja-JP';
    u.rate=.9;
    u.pitch=.9;
    u.volume=1;
    const v=pickKyoko();
    if(v){u.voice=v;log('voice: '+v.name);}
    else log('voice: Kyoko not found, fallback');
    u.onend=resolve;
    u.onerror=e=>{log('speech error: '+(e.error||'unknown'));resolve();};
    speechSynthesis.speak(u);
  });
}
if('speechSynthesis' in window){
  speechSynthesis.onvoiceschanged=()=>log('voices loaded: '+speechSynthesis.getVoices().length);
}

async function startEvent(){
  if(eventRunning){log('event already running');return;}
  eventRunning=true;
  startBtn.disabled=true;
  try{
    speechBox.textContent='自転車が来ます';
    setStatus(audioUnlocked?'イベント開始':'未初期化でもイベント開始');
    log('bicycle event start');

    bicycle.style.transition='none';
    bicycle.style.display='block';
    bicycle.style.left='1260px';
    bicycle.style.bottom='72px';
    bicycle.offsetHeight;

    await playBell('bell at bicycle appear');

    bicycle.style.transition='left 2300ms linear';
    bicycle.style.left='825px';
    await wait(2400);

    speechBox.textContent='こら！二人乗り禁止';
    log('bicycle stop before police');
    await speakPolice('こら、ふたりのりきんし');
    await wait(300);

    speechBox.textContent='自転車が再発進します';
    bicycle.style.transition='left 2600ms linear';
    bicycle.style.left='-330px';
    await wait(2700);

    speechBox.textContent='検証終了';
    setStatus('イベント終了。もう一度テストできます');
    log('bicycle event end');
  }catch(err){
    setStatus('イベント中にエラー');
    log('event error: '+formatError(err));
  }finally{
    bicycle.style.display='none';
    bicycle.style.transition='none';
    bicycle.style.left='1260px';
    startBtn.disabled=false;
    eventRunning=false;
  }
}

initBtn.addEventListener('click',unlockBell);
initBtn.addEventListener('touchend',()=>{}, {passive:true});
startBtn.addEventListener('click',startEvent);
resetBtn.addEventListener('click',()=>resetVisuals(false));

bicycle.onerror=()=>log('bicycle.png load failed');
bicycle.onload=()=>log('bicycle.png loaded');
police.onerror=()=>log('policeman.png load failed');
police.onload=()=>log('policeman.png loaded');
bell.onerror=()=>log('bell2.mp3 load failed');
bell.oncanplaythrough=()=>log('bell2.mp3 canplaythrough');
log('test page v2 ready');
</script>
</body>
</html>
